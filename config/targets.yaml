# CeliacMap — data-driven search scope.
# Scaling across Latin America = adding entries here, not changing code.

# Terms the Search agent queries against the Google Places API.
search_terms:
  - "sin TACC"
  - "gluten free"
  - "celíaco"
  - "apto celíacos"
  - "panadería sin gluten"
  - "libre de gluten"
  - "sin gluten"
  - "pizzería sin TACC"
  - "pastelería sin TACC"
  - "menú sin TACC"

# Social discovery (Social agent): finds public Instagram / Facebook business
# pages via the Tavily Search API. A query is generated as
#   "<term>" "<city>"
# for every platform x term x city, where <term> spans both `search_terms` and
# `social_hashtags` below; the platform is applied as a Tavily `include_domains`
# restriction (cities come from `countries` below).
social:
  platforms:
    - instagram.com
    - facebook.com
  search_terms:
    - "sin TACC"
    - "gluten free"
    - "libre de gluten"
    - "sin gluten"
  # Hashtags used only by the Social agent (not the Google Places Search agent).
  social_hashtags:
    - "#sintacc"
    - "#singluten"
    - "#glutenfree"
    - "#celiacouruguay"
    - "#celiacoargentina"
    - "#aptocelíaco"
    - "#libredegluten"

# Maps our three frontend/DB categories to Google Places types.
# The Search agent uses these to assign a category to each candidate.
categories:
  restaurant:
    - restaurant
    - meal_takeaway
  cafe:
    - cafe
    - bakery
  shop:
    - grocery_or_supermarket
    - store
    - health

# Uruguay (full national coverage) + Argentina (major metros + Entre Ríos).
# Each city defines a search center + radius. Adding a city = a new entry here.
#
# Web discovery (Web agent, v3): a city is researched by the autonomous web-search
# agent only when it is flagged `web: true`. Rollout starts with Montevideo and
# Buenos Aires; add the flag to more cities after verifying it works.
