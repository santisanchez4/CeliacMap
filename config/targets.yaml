# CeliacMap — data-driven search scope.
# Scaling across Latin America = adding entries here, not changing code.

# Terms the Search agent queries against the Google Places API.
search_terms:
  - "sin TACC"
  - "gluten free"
  - "celíaco"
  - "apto celíacos"
  - "panadería sin gluten"
  - "libre de gluten"
  - "sin gluten"
  - "pizzería sin TACC"
  - "pastelería sin TACC"
  - "menú sin TACC"

# Social discovery (Social agent): finds public Instagram / Facebook business
# pages via the Tavily Search API. A query is generated as
#   "<term>" "<city>"
# for every platform x term x city, where <term> spans both `search_terms` and
# `social_hashtags` below; the platform is applied as a Tavily `include_domains`
# restriction (cities come from `countries` below).
social:
  platforms:
    - instagram.com
    - facebook.com
  search_terms:
    - "sin TACC"
    - "gluten free"
    - "libre de gluten"
    - "sin gluten"
  # Hashtags used only by the Social agent (not the Google Places Search agent).
  social_hashtags:
    - "#sintacc"
    - "#singluten"
    - "#glutenfree"
    - "#celiacouruguay"
    - "#celiacoargentina"
    - "#aptocelíaco"
    - "#libredegluten"

# Maps our three frontend/DB categories to Google Places types.
# The Search agent uses these to assign a category to each candidate.
categories:
  restaurant:
    - restaurant
    - meal_takeaway
  cafe:
    - cafe
    - bakery
  shop:
    - grocery_or_supermarket
    - store
    - health

# Phase 1: Uruguay + Argentina. Each city defines a search center + radius.
countries:
  - name: Uruguay
    cities:
      - name: Montevideo
        lat: -34.9011
        lng: -56.1645
        radius_m: 12000
  - name: Argentina
    cities:
      - name: Buenos Aires
        lat: -34.6037
        lng: -58.3816
        radius_m: 15000
